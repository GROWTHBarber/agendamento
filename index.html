<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Agendamento</title>

  <link rel="stylesheet" href="style.css">

</head>
<body>
  
  <h1 class="titulop">Agendar horário</h1>
  <div class="agendamento">
    <input id="nome" placeholder="DIGITE SEU NOME">
    <label class="datatxt" for="hora">Data</label>
    
    
    <label class="horatxt" for="hora">Horário</label>
    
    <input id="data" type="date">
    

<select id="hora">
  <option value="">Escolha o horário</option>
     <option>18:00</option>
     <option>19:00</option>
     <option>20:00</option>
     <option>21:00</option>
     
    </select>
    <button id="agendar" onclick="enviarWhats()">Enviar no WhatsApp</button>
    
    
  </div>

 

  
  <div  class="listaagenda">
    <h2 class="titulo">Seu Agendamento:</h2>
    <ul id="lista"></ul>
    
  </div>
  

  <script src="javas.js"></script>
</body>
</html>
